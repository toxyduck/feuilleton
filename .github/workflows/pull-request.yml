name: Pull request

on:
  workflow_call:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run check:deps

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test

  compile:
    strategy:
      matrix:
        target:
          - bun-darwin-arm64
          - bun-darwin-x64
          - bun-linux-arm64
          - bun-linux-x64-baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          FTN_TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: feuilleton-${{ matrix.target }}
          path: dist/

  plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: |
          jq empty integrations/claude-plugin/.claude-plugin/marketplace.json
          jq empty integrations/claude-plugin/plugin/.claude-plugin/plugin.json
          jq empty integrations/claude-plugin/plugin/hooks/hooks.json
          jq empty integrations/codex-plugin/.agents/plugins/marketplace.json
          jq empty integrations/codex-plugin/plugin/.codex-plugin/plugin.json
          jq empty integrations/codex-plugin/plugin/hooks/hooks.json
      - run: bun test packages/adapter-codex packages/adapter-claude
